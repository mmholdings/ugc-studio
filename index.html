<!doctype html><html lang=en><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1"><title>UGC Studio</title>
<style>
:root{--bg:#0a0e13;--card:#141b23;--c2:#0f1722;--ink:#eaf0f6;--mut:#8da2b5;--acc:#22c55e;--acc2:#6fd3ff;--pink:#ec4899;--line:#1f2c38;--warn:#fbbf24}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto}
header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
h1{font-size:18px;margin:0}.sub{color:var(--mut);font-size:13px}
nav{display:flex;gap:4px;padding:0 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:9;flex-wrap:wrap}
nav button{background:none;border:0;color:var(--mut);padding:13px 15px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent}
nav button.on{color:var(--ink);border-bottom-color:var(--acc);font-weight:600}
.wrap{max-width:1180px;margin:0 auto;padding:22px 24px}section{display:none}section.on{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.kpi .n{font-size:26px;font-weight:700}.kpi .n.acc{color:var(--acc)}.kpi .l{color:var(--mut);font-size:12px;margin-top:2px}
.flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.step{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px}
.step .t{font-weight:600;font-size:13px}.step .d{color:var(--mut);font-size:12px;margin-top:5px}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;margin-top:8px;border:1px solid var(--line);color:var(--mut)}
.tag.done{color:var(--acc)}.tag.live{color:var(--acc2)}.tag.input,.tag.next{color:var(--warn)}
.brandgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}@media(max-width:760px){.brandgrid{grid-template-columns:1fr}}
.bcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.bcard.female{border-top:3px solid var(--pink)}.bcard.male{border-top:3px solid var(--acc2)}
.bcard h3{margin:0 0 4px}.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.row .k{color:var(--mut)}.row .v{text-align:right}.chip{display:inline-block;background:var(--c2);border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:11px;margin:2px}
.refbox{margin-top:12px;border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center;color:var(--mut);font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line)}th{color:var(--mut);font-weight:600;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.vcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.vcard video{width:100%;aspect-ratio:9/16;object-fit:cover;background:#000}.vbody{padding:12px;display:flex;flex-direction:column;gap:7px}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--c2);border:1px solid var(--line)}.badge.f{color:var(--pink)}.badge.m{color:var(--acc2)}.badge.ai{color:var(--acc)}
.note{color:var(--mut);font-size:13px;border:1px dashed var(--line);border-radius:10px;padding:12px 14px;margin:0 0 16px}
.filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter button{background:var(--c2);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:6px 13px;cursor:pointer;font-size:13px}
.filter button.on{background:var(--acc);color:#04210f;font-weight:600;border-color:var(--acc)}
a{color:var(--acc2);word-break:break-all}input{background:var(--c2);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:5px 8px}
</style></head><body>
<header><h1>🎬 UGC Studio</h1><span class=sub>2-brand TikTok Shop affiliate engine · AI creators</span>
<span class=sub style="margin-left:auto" id=hdr></span></header>
<nav id=nav></nav>
<div class=wrap>
 <section id=overview class=on></section>
 <section id=brands></section>
 <section id=vault></section>
 <section id=workflow></section>
</div>
<script>
const D={"brands": [{"id": "female", "label": "Brand A \u2014 Female creator", "tiktok_handle": "@SET_YOUR_FEMALE_HANDLE", "creator": {"name": "TBD (you'll provide)", "reference_image": null, "voice": "female \u2014 Piper en_US-hfc_female (default; swap to a cloned voice later)", "avatar_status": "not set \u2014 provide 5+ creator photos to train a Soul / Marketing Studio avatar"}, "assigned_categories": ["beauty & personal care", "wellness (female-skew)", "home"], "notes": "Run products that convert better with a female UGC creator."}, {"id": "male", "label": "Brand B \u2014 Male creator", "tiktok_handle": "@SET_YOUR_MALE_HANDLE", "creator": {"name": "TBD (you'll provide)", "reference_image": null, "voice": "male \u2014 Piper en_US-ryan (to be added; swap to a cloned voice later)", "avatar_status": "not set \u2014 provide 5+ creator photos to train a Soul / Marketing Studio avatar"}, "assigned_categories": ["fitness & supplements (male-skew)", "tech & gadgets", "tools/outdoor"], "notes": "Run products that convert better with a male UGC creator."}], "feed": {"updated": "2026-06-03", "products": [{"name": "Toplux Moringa 1200mg", "cat": "wellness", "price": 17.97, "sold": "22.9k", "rev": "$330k", "growth": "+145%", "product_link": "https://shop.tiktok.com/ADD_MORINGA_PRODUCT_LINK"}, {"name": "Magnesium Complex 1000mg", "cat": "wellness", "price": 49.97, "sold": "30.2k", "rev": "$444k", "growth": "+50%", "product_link": "https://shop.tiktok.com/ADD_MAGNESIUM_PRODUCT_LINK"}, {"name": "Toplux Beet Root 2040mg", "cat": "wellness", "price": 16.97, "sold": "18.3k", "rev": "$290k", "growth": "+9%", "product_link": "https://shop.tiktok.com/ADD_BEETROOT_PRODUCT_LINK"}, {"name": "Hustle Butter Tattoo Balm", "cat": "tattoo", "price": 40.0, "sold": "15.4k", "rev": "$230k", "growth": "+23%", "product_link": "https://shop.tiktok.com/ADD_HUSTLEBUTTER_PRODUCT_LINK"}, {"name": "Keto Burn Supplement", "cat": "weight", "price": 21.97, "sold": "33.8k", "rev": "$506k", "growth": "+24%", "product_link": "https://shop.tiktok.com/ADD_KETO_PRODUCT_LINK"}, {"name": "Feminine Balance Gummies", "cat": "womens", "price": 39.99, "sold": "11.5k", "rev": "$267k", "growth": "+3%", "product_link": "https://shop.tiktok.com/ADD_FEMBALANCE_PRODUCT_LINK"}, {"name": "Kind Patches Metabolic Trio", "cat": "wellness", "price": 45.0, "sold": "7.5k", "rev": "$193k", "growth": "+6%", "product_link": "https://shop.tiktok.com/ADD_KINDPATCH_PRODUCT_LINK"}], "top_videos": [{"product": "Moringa", "hook": "(selfie, outdoors)", "len": "1m17s", "rev": "$39.2k", "views": "1.14M", "format": "talking-head testimonial"}, {"product": "Moringa", "hook": "Solo escucha (Just listen)", "len": "1m19s", "rev": "$35.0k", "views": "970k", "format": "selfie talking to camera"}, {"product": "Moringa", "hook": "Just listen", "len": "1m36s", "rev": "$25.9k", "views": "809k", "format": "selfie talking to camera"}, {"product": "Moringa", "hook": "Escucha bien (Listen carefully)", "len": "1m42s", "rev": "$12.5k", "views": "498k", "format": "two-person testimonial"}]}, "gen": [{"brand": "female", "product": "Toplux Moringa 1200mg", "category": "wellness", "model": "Seedance 2.0 (Higgsfield)", "duration": 8, "aspect": "1:1 (next runs 9:16)", "file": "pipeline/out/aigen/moringa_ai_01.mp4", "source": "ai-generated from product photo + competitor-modeled prompt", "product_url": "https://shop.tiktok.com/REPLACE_MORINGA_AFFILIATE_LINK", "status": "raw clip \u2014 needs finishing layer (hook/caption/CTA) + stitch", "created": "2026-06-03", "url": "https://d8j0ntlcm91z4.cloudfront.net/user_3Ebn0yC4it9aRGZRP7iOf76LppD/hf_20260603_034413_c7031cbe-58c0-4baa-98b2-d810b52dc0c6.mp4"}], "steps": [["1 \u00b7 Research", "Pull hundreds of best-selling products daily (EchoTik / Kalodata)", "app"], ["2 \u00b7 Top videos", "Save the top converting videos per product as the format blueprint", "app"], ["3 \u00b7 Creator", "Lock one on-brand AI creator per brand (avatar + voice)", "input"], ["4 \u00b7 Generate", "Copy the winning video format shot-for-shot with our product", "live"], ["5 \u00b7 Stitch", "Combine 8s shots into the full-length video", "build"], ["6 \u00b7 Finish", "Captions/CTA/voice (AI disclosure = post toggle, not on-video)", "done"], ["7 \u00b7 Vault", "Store products, top videos, and our generated clips", "app"], ["8 \u00b7 Post", "Add the product link manually + post; autoposter in v2", "next"]]};
const TABS=[["overview","Overview"],["brands","Brands & Creators"],["vault","Video Vault"],["workflow","Workflow"]];
document.getElementById('nav').innerHTML=TABS.map(([id,l],i)=>`<button class="${i==0?'on':''}" onclick="tab('${id}',this)">${l}</button>`).join('');
function tab(id,b){document.querySelectorAll('section').forEach(s=>s.classList.toggle('on',s.id==id));document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
document.getElementById('hdr').textContent=`${D.feed.products.length} products · ${D.feed.top_videos.length} top videos · ${D.gen.length} generated`;

document.getElementById('overview').innerHTML=`
 <div class=kpis>
  <div class=kpi><div class=n>2</div><div class=l>brands / TikTok accounts</div></div>
  <div class=kpi><div class=n acc>${D.feed.products.length}</div><div class=l>best-sellers (today)</div></div>
  <div class=kpi><div class=n>${D.feed.top_videos.length}</div><div class=l>top converting videos</div></div>
  <div class=kpi><div class=n acc>${D.gen.length}</div><div class=l>generated clips</div></div>
 </div>
 <h3 style="margin:6px 0 12px">Workflow</h3>
 <div class=flow>${D.steps.map(s=>`<div class=step><div class=t>${s[0]}</div><div class=d>${s[1]}</div><span class="tag ${s[2]}">${({done:'automated',app:'in app',input:'needs your input',live:'live',next:'v2'})[s[2]]}</span></div>`).join('')}</div>
 <div class=note style="margin-top:18px"><b>Format rule:</b> we copy the top converting video's format <i>shot-for-shot</i> — the top 3 per product use the same structure (talking-head testimonial → product hold → CTA). Same format, our product + on-brand creator.</div>`;

document.getElementById('brands').innerHTML=`
 <div class=note>Each TikTok account = one brand + one locked creator. Add your handle/creator name and a reference photo (saves in your browser). Also drop the photo into this chat / <code>config/creators/</code> so I can train the avatar.</div>
 <div class=brandgrid>${D.brands.map(b=>`<div class="bcard ${b.id}">
   <h3>${esc(b.label)}</h3>
   <div class=row><span class=k>TikTok handle</span><span class=v>${esc(b.tiktok_handle)}</span></div>
   <div class=row><span class=k>Voice</span><span class=v>${esc(b.creator.voice)}</span></div>
   <div class=row><span class=k>Avatar</span><span class=v>${esc(b.creator.avatar_status)}</span></div>
   <div class=row><span class=k>Categories</span><span class=v>${b.assigned_categories.map(c=>`<span class=chip>${esc(c)}</span>`).join('')}</span></div>
   <div class=refbox>📸 Creator reference photo — provide via chat (1 = avatar, 5+ = locked Soul)</div>
 </div>`).join('')}</div>`;

let vf='products';
function renderVault(){
  let body='';
  if(vf=='products'){
    body=`<div class=note>Hundreds of best-selling products pulled daily from the sources. The <b>product link</b> is added manually to each video at post time.</div>
    <table><tr><th>Product</th><th>Category</th><th>Price</th><th>Sold</th><th>30d Rev</th><th>Growth</th><th>Product link</th></tr>
    ${D.feed.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.cat)}</td><td>$${p.price}</td><td>${p.sold}</td><td>${p.rev}</td><td>${p.growth}</td><td><a href="${p.product_link}">link</a></td></tr>`).join('')}</table>`;
  } else if(vf=='top'){
    body=`<div class=note>Top converting videos per product — our format blueprint. We copy these shot-for-shot.</div>
    <table><tr><th>Product</th><th>Hook</th><th>Length</th><th>Views</th><th>Revenue</th><th>Format</th></tr>
    ${D.feed.top_videos.map(v=>`<tr><td>${esc(v.product)}</td><td>${esc(v.hook)}</td><td>${v.len}</td><td>${v.views}</td><td>${v.rev}</td><td>${esc(v.format)}</td></tr>`).join('')}</table>`;
  } else {
    body=`<div class=note>Our AI-generated clips, ready to post.</div>
    <div class=grid>${D.gen.map(v=>`<div class=vcard><video src="${v.url||v.video}" controls preload=metadata></video>
      <div class=vbody><div><span class="badge ${v.brand=='female'?'f':'m'}">${v.brand=='female'?'Brand A':'Brand B'}</span> <span class="badge ai">${esc(v.model)}</span></div>
      <div style="font-weight:600;font-size:13px">${esc(v.product)}</div><div class=sub style="font-size:12px">${esc(v.status||'')}</div></div></div>`).join('')||'<p class=sub>No generated clips yet.</p>'}</div>`;
  }
  document.getElementById('vault').innerHTML=`
   <div class=filter>
     <button class="${vf=='products'?'on':''}" onclick="setVf('products')">Best-selling products</button>
     <button class="${vf=='top'?'on':''}" onclick="setVf('top')">Top converting videos</button>
     <button class="${vf=='gen'?'on':''}" onclick="setVf('gen')">Generated clips</button>
   </div>${body}`;
}
function setVf(f){vf=f;renderVault()}
document.getElementById('workflow').innerHTML=`<div class=note>How a post gets made.</div>
 <div class=flow>${D.steps.map(s=>`<div class=step><div class=t>${s[0]}</div><div class=d>${s[1]}</div><span class="tag ${s[2]}">${({done:'automated',app:'in app',input:'needs your input',live:'live',next:'v2'})[s[2]]}</span></div>`).join('')}</div>`;
renderVault();
</script></body></html>
